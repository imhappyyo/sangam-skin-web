<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catalogue — 118 Serums — Sangam Skin</title>
<meta name="description" content="Browse all 118 Sangam Skin serums for face, hair, lips and lashes. Filter by category or concern, or take the quiz for a personalised routine." />
<link rel="icon" href="/assets/images/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css" />
<link rel="stylesheet" href="/assets/css/site.css" />
<link rel="stylesheet" href="/assets/css/home.css" />
<link rel="stylesheet" href="/assets/css/catalog.css" />
</head>
<body>

<div id="site-header" data-active="catalog"></div>

<main class="catalog">
  <div class="container">
    <div class="catalog__head reveal in">
      <p class="eyebrow" data-i18n="cat_eyebrow"></p>
      <h1 data-i18n="cat_title"></h1>
    </div>

    <div class="catalog__search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="catalog-search" data-i18n-attr="placeholder:cat_search_ph" />
    </div>

    <div class="catalog__filters">
      <div class="catalog__filter-row" id="catalog-categories"></div>
      <div class="catalog__filter-row" id="catalog-concerns"></div>
    </div>

    <div class="catalog__count-row">
      <span class="catalog__count" id="catalog-count"></span>
      <button class="catalog__clear" id="catalog-clear" type="button" data-i18n="cat_clear" hidden></button>
    </div>

    <div class="product-grid catalog__grid" id="catalog-grid"></div>
    <div class="catalog__empty" id="catalog-empty" hidden>
      <p data-i18n="cat_empty_title"></p>
      <button class="btn btn--outline btn--sm" id="catalog-empty-clear" data-i18n="cat_clear"></button>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="/data/products.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/chrome.js"></script>
<script src="/assets/js/reveal.js"></script>
<script src="/assets/js/product-card.js"></script>
<script src="/assets/js/catalog.js"></script>
</body>
</html>
