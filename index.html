<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sangam Skin — Ayurvedic Serums, Matched to Your Skin</title>
<meta name="description" content="118 clinically-formulated Ayurvedic serums. Take the two-minute skin quiz for a personalised AM/PM routine, built with an ingredient-safety engine." />
<link rel="icon" href="/assets/images/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css" />
<link rel="stylesheet" href="/assets/css/site.css" />
<link rel="stylesheet" href="/assets/css/home.css" />
</head>
<body>

<div id="site-header" data-active="home"></div>

<!-- ============================= HERO ============================= -->
<section class="hero">
  <div class="hero__glow hero__glow--a"></div>
  <div class="hero__glow hero__glow--b"></div>
  <div class="container hero__inner">
    <div class="hero__copy reveal in">
      <p class="eyebrow" data-i18n="hero_eyebrow"></p>
      <h1 data-i18n="hero_title"></h1>
      <p class="hero__sub" data-i18n="hero_sub"></p>
      <div class="hero__ctas">
        <a class="btn btn--primary" href="/quiz.html" data-i18n="hero_cta_quiz"></a>
        <a class="btn btn--outline" href="/catalog.html" data-i18n="hero_cta_catalog"></a>
      </div>
      <div class="hero__stats">
        <div><strong>118</strong><span data-i18n="hero_stat_products"></span></div>
        <div><strong>50</strong><span data-i18n="hero_stat_actives"></span></div>
        <div><strong>2<span class="hero__min" data-i18n="hero_stat_min"></span></strong><span data-i18n="hero_stat_quiz"></span></div>
      </div>
    </div>
    <div class="hero__visual reveal in">
      <div class="hero__card hero__card--main">
        <span class="eyebrow" data-i18n="hero_card_eyebrow"></span>
        <p class="hero__card-title" data-i18n="hero_card_title"></p>
        <div class="hero__ring">
          <svg viewBox="0 0 100 100" width="88" height="88">
            <circle cx="50" cy="50" r="42" fill="none" stroke="#EFE2D8" stroke-width="8"/>
            <circle cx="50" cy="50" r="42" fill="none" stroke="#A47764" stroke-width="8"
              stroke-dasharray="264" stroke-dashoffset="86" stroke-linecap="round" transform="rotate(-90 50 50)"/>
          </svg>
          <span>4/6</span>
        </div>
        <p class="hero__card-note" data-i18n="hero_card_note"></p>
      </div>
      <div class="hero__card hero__card--float">
        <span class="badge badge--ok" data-i18n="hero_float_badge"></span>
        <p class="hero__float-title" data-i18n="hero_float_title"></p>
      </div>
    </div>
  </div>
</section>

<!-- ============================= HOW IT WORKS ============================= -->
<section class="section how">
  <div class="container">
    <div class="section-head section-head--center reveal">
      <p class="eyebrow" data-i18n="how_eyebrow"></p>
      <h2 data-i18n="how_title"></h2>
      <p data-i18n="how_sub"></p>
    </div>
    <div class="how__grid">
      <div class="how__step reveal">
        <div class="how__num">01</div>
        <h3 data-i18n="how_1_title"></h3>
        <p data-i18n="how_1_body"></p>
      </div>
      <div class="how__step reveal">
        <div class="how__num">02</div>
        <h3 data-i18n="how_2_title"></h3>
        <p data-i18n="how_2_body"></p>
      </div>
      <div class="how__step reveal">
        <div class="how__num">03</div>
        <h3 data-i18n="how_3_title"></h3>
        <p data-i18n="how_3_body"></p>
      </div>
      <div class="how__step reveal">
        <div class="how__num">04</div>
        <h3 data-i18n="how_4_title"></h3>
        <p data-i18n="how_4_body"></p>
      </div>
    </div>
  </div>
</section>

<!-- ============================= SKIN LENS ============================= -->
<section class="section lens-teaser">
  <div class="container lens-teaser__inner">
    <div class="lens-teaser__visual reveal">
      <div class="lens-mock">
        <div class="lens-mock__scan"></div>
        <svg class="lens-mock__frame" viewBox="0 0 200 260" width="200" height="260">
          <rect x="4" y="4" width="192" height="252" rx="24" fill="none" stroke="#A47764" stroke-width="2" stroke-dasharray="6 6" opacity="0.5"/>
        </svg>
        <div class="lens-mock__score">
          <span>78</span>
          <small data-i18n="lens_mock_score_label"></small>
        </div>
      </div>
    </div>
    <div class="lens-teaser__copy reveal">
      <p class="eyebrow" data-i18n="lens_eyebrow"></p>
      <h2 data-i18n="lens_title"></h2>
      <p data-i18n="lens_body"></p>
      <ul class="lens-teaser__list">
        <li data-i18n="lens_point_1"></li>
        <li data-i18n="lens_point_2"></li>
        <li data-i18n="lens_point_3"></li>
      </ul>
      <a class="btn btn--accent" href="/lens.html" data-i18n="lens_cta"></a>
    </div>
  </div>
</section>

<!-- ============================= FEATURED PRODUCTS ============================= -->
<section class="section featured">
  <div class="container">
    <div class="section-head reveal" style="display:flex; align-items:flex-end; justify-content:space-between; max-width:none;">
      <div>
        <p class="eyebrow" data-i18n="featured_eyebrow"></p>
        <h2 data-i18n="featured_title"></h2>
      </div>
      <a class="btn btn--outline btn--sm" href="/catalog.html" data-i18n="featured_see_all"></a>
    </div>
    <div class="product-grid" id="featured-grid"></div>
  </div>
</section>

<!-- ============================= INGREDIENT SCIENCE ============================= -->
<section class="section science">
  <div class="container science__inner">
    <div class="reveal">
      <p class="eyebrow" data-i18n="science_eyebrow"></p>
      <h2 data-i18n="science_title"></h2>
      <p class="science__body" data-i18n="science_body"></p>
      <a class="btn btn--outline" href="/ingredients.html" data-i18n="science_cta"></a>
    </div>
    <div class="science__pills reveal">
      <span class="chip" data-i18n="pill_retinol"></span>
      <span class="chip" data-i18n="pill_niacinamide"></span>
      <span class="chip" data-i18n="pill_vitc"></span>
      <span class="chip" data-i18n="pill_ha"></span>
      <span class="chip" data-i18n="pill_peptides"></span>
      <span class="chip" data-i18n="pill_bakuchiol"></span>
      <span class="chip" data-i18n="pill_ceramides"></span>
      <span class="chip" data-i18n="pill_azelaic"></span>
      <span class="chip" data-i18n="pill_spf"></span>
    </div>
  </div>
</section>

<!-- ============================= FOUNDER NOTE ============================= -->
<section class="section founder">
  <div class="container founder__inner reveal">
    <p class="founder__mark">"</p>
    <p class="founder__quote" data-i18n="founder_quote"></p>
    <p class="founder__name" data-i18n="founder_name"></p>
    <p class="founder__role" data-i18n="founder_role"></p>
  </div>
</section>

<!-- ============================= APP CTA ============================= -->
<section class="section app-cta">
  <div class="container app-cta__inner reveal">
    <div>
      <p class="eyebrow" data-i18n="appcta_eyebrow"></p>
      <h2 data-i18n="appcta_title"></h2>
      <p data-i18n="appcta_body"></p>
      <div class="app-cta__ctas">
        <a class="btn btn--primary" href="/quiz.html" data-i18n="appcta_cta_web"></a>
        <span class="app-cta__soon" data-i18n="appcta_soon"></span>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="/data/products.js"></script>
<script src="/data/ingredients.js"></script>
<script src="/data/conflicts.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/chrome.js"></script>
<script src="/assets/js/reveal.js"></script>
<script src="/assets/js/product-card.js"></script>
<script src="/assets/js/home.js"></script>
</body>
</html>
