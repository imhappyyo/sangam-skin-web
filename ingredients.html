<body>

<div id="site-header" data-active="ingredients"></div>

<main class="ingx">

  <!-- ============ dark lab hero band ============ -->
  <section class="ingx-hero section--dark">
    <img class="ingx-hero__bg" src="/assets/images/photos/botanical-macro.jpg" alt="" aria-hidden="true" />
    <div class="ingx-hero__overlay" aria-hidden="true"></div>
    <div class="container ingx-hero__inner">
      <p class="eyebrow" data-fx="up" data-i18n="ing_eyebrow"></p>
      <h1 data-fx="up" data-fx-delay="80" data-i18n="ing_title"></h1>
      <p class="ingx-hero__sub" data-fx="up" data-fx-delay="160" data-i18n="ing_sub"></p>
      <div class="ingx-hero__stats" data-fx="up" data-fx-delay="240">
        <div class="ingx-stat">
          <span class="ingx-stat__num" data-countup="50">0</span>
          <span class="ingx-stat__label" data-i18n="ing_stat_actives"></span>
        </div>
        <div class="ingx-stat">
          <span class="ingx-stat__num" data-countup="17">0</span>
          <span class="ingx-stat__label" data-i18n="ing_stat_families"></span>
        </div>
        <div class="ingx-stat">
          <span class="ingx-stat__num" data-countup="118">0</span>
          <span class="ingx-stat__label" data-i18n="ing_stat_serums"></span>
        </div>
      </div>
    </div>
    <hr class="line-iris ingx-hero__line" aria-hidden="true" />
  </section>

  <!-- ============ light clinical body ============ -->
  <section class="ingx-body section--light">
    <div class="container">

      <div class="ingx-controls" data-fx="up">
        <label class="ingx-search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" id="ing-search" data-i18n-attr="placeholder:ing_search_ph,aria-label:ing_search_ph" />
        </label>
        <div class="ingx-filters" id="ing-families"></div>
        <div class="ingx-count-row">
          <span class="ingx-count" id="ing-count"></span>
          <span class="ingx-count-rule" aria-hidden="true"></span>
        </div>
      </div>

      <div class="ing-grid" id="ing-grid"></div>

    </div>
  </section>

</main>

<div id="site-footer"></div>
