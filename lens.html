<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skin Lens — AI Skin Analysis — Sangam Skin</title>
<meta name="description" content="How Skin Lens reads your skin across 7 dimensions with a gentle, strengths-first AI analysis — and how your privacy is protected." />
<link rel="icon" href="/assets/images/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css" />
<link rel="stylesheet" href="/assets/css/site.css" />
<link rel="stylesheet" href="/assets/css/home.css" />
<link rel="stylesheet" href="/assets/css/lens.css" />
</head>
<body>

<div id="site-header" data-active=""></div>

<main class="lens-page">
  <div class="container lens-page__hero reveal in">
    <p class="eyebrow" data-i18n="lens_eyebrow"></p>
    <h1 data-i18n="lens_title"></h1>
    <p class="lens-page__lede" data-i18n="lens_body"></p>
  </div>

  <div class="container lens-page__demo reveal">
    <div class="lens-mock lens-mock--big">
      <div class="lens-mock__scan"></div>
      <svg class="lens-mock__frame" viewBox="0 0 200 260" width="220" height="286"><rect x="4" y="4" width="192" height="252" rx="24" fill="none" stroke="#A47764" stroke-width="2" stroke-dasharray="6 6" opacity="0.5"/></svg>
      <div class="lens-mock__score"><span>78</span><small data-i18n="lens_mock_score_label"></small></div>
    </div>
    <div class="lens-page__dims">
      <p class="lens-page__dims-label" data-i18n="lens_dims_label"></p>
      <div class="lens-dim" data-dim="hydration"><span data-i18n="lens_dim_hydration"></span><div class="lens-dim__bar"><i style="width:82%"></i></div></div>
      <div class="lens-dim" data-dim="texture"><span data-i18n="lens_dim_texture"></span><div class="lens-dim__bar"><i style="width:74%"></i></div></div>
      <div class="lens-dim" data-dim="radiance"><span data-i18n="lens_dim_radiance"></span><div class="lens-dim__bar"><i style="width:80%"></i></div></div>
      <div class="lens-dim" data-dim="evenness"><span data-i18n="lens_dim_evenness"></span><div class="lens-dim__bar"><i style="width:68%"></i></div></div>
      <div class="lens-dim" data-dim="pores"><span data-i18n="lens_dim_pores"></span><div class="lens-dim__bar"><i style="width:71%"></i></div></div>
      <div class="lens-dim" data-dim="redness"><span data-i18n="lens_dim_redness"></span><div class="lens-dim__bar"><i style="width:85%"></i></div></div>
      <div class="lens-dim" data-dim="eye"><span data-i18n="lens_dim_eye"></span><div class="lens-dim__bar"><i style="width:66%"></i></div></div>
      <p class="lens-page__dims-note" data-i18n="lens_dims_note"></p>
    </div>
  </div>

  <div class="container">
    <div class="how__grid lens-page__how reveal">
      <div class="how__step">
        <div class="how__num">01</div>
        <h3 data-i18n="lens_step_1_title"></h3>
        <p data-i18n="lens_step_1_body"></p>
      </div>
      <div class="how__step">
        <div class="how__num">02</div>
        <h3 data-i18n="lens_step_2_title"></h3>
        <p data-i18n="lens_step_2_body"></p>
      </div>
      <div class="how__step">
        <div class="how__num">03</div>
        <h3 data-i18n="lens_step_3_title"></h3>
        <p data-i18n="lens_step_3_body"></p>
      </div>
    </div>

    <div class="lens-page__privacy reveal">
      <h2 data-i18n="lens_privacy_title"></h2>
      <p data-i18n="lens_privacy_body"></p>
      <p class="lens-page__disclaimer" data-i18n="lres_disclaimer_photo"></p>
    </div>

    <div class="lens-page__cta reveal">
      <p data-i18n="lens_availability"></p>
      <a class="btn btn--primary" href="/quiz.html" data-i18n="hero_cta_quiz"></a>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/chrome.js"></script>
<script src="/assets/js/reveal.js"></script>
</body>
</html>
