<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skin Quiz — Sangam Skin</title>
<meta name="description" content="A two-minute quiz that builds your personal AM/PM serum routine from all 118 Sangam formulas, safety-checked for conflicts." />
<link rel="icon" href="/assets/images/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css" />
<link rel="stylesheet" href="/assets/css/site.css" />

</head>
<body>

<div id="site-header" data-active="quiz"></div>

<main class="quiz">
  <div class="container quiz__container">
    <div class="quiz__progress-row">
      <button class="quiz__back" type="button" data-quiz-back aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="quiz__progress-track"><div class="quiz__progress-fill" data-quiz-progress></div></div>
      <span class="quiz__counter" data-quiz-counter></span>
    </div>

    <div class="quiz__stage" data-quiz-stage></div>
  </div>
</main>

<div id="site-footer"></div>

<script src="/data/products.js"></script>
<script src="/data/conflicts.js"></script>
<script src="/data/quiz.js"></script>
<script src="/assets/js/engine.js"></script>
